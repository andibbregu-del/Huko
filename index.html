<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ndeshjet Live | Shiko Falas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="admin-trigger" onclick="handleSecretClick()"></button>

    <section id="home-view" class="view">
        <header class="main-header">
            <div class="logo">NDESHJET<span>LIVE</span></div>
            <p>Zgjidhni kanalin për të nisur transmetimin</p>
        </header>

        <div class="channel-grid" id="main-grid"></div>
    </section>

    <section id="player-view" class="view" style="display: none;">
        <div id="fs-overlay" onclick="startStream()">
            <div class="play-btn">▶ NISNI SHIKIMIN</div>
        </div>
        <button class="back-btn" onclick="closePlayer()">← Mbrapa</button>
        <iframe id="mainFrame" src="" allow="autoplay; encrypted-media; gyroscope; accelerometer; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    </section>

    <script src="script.js"></script>
</body>
</html>
