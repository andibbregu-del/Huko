<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 12px; width: 350px; border: 1px solid #22c55e; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #000; color: white; }
        button { width: 100%; padding: 10px; background: #22c55e; border: none; color: black; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .logout { background: transparent; border: 1px solid white; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box" id="login">
        <h2>Admin Login</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="check()">Hyr</button>
    </div>

    <div class="box" id="panel" style="display:none;">
        <h2>Shto Kanal</h2>
        <input type="text" id="n" placeholder="Emri i Kanalit">
        <input type="text" id="l" placeholder="Linku i Streamit">
        <button onclick="add()">Shto Kanalin</button>
        <button class="logout" onclick="localStorage.removeItem('myChannels'); location.reload();">Reset Defaults</button>
        <button class="logout" onclick="window.location.href='index.html'">Shiko Webin</button>
    </div>

    <script>
        function check() {
            if(document.getElementById('u').value === "Elephant" && document.getElementById('p').value === "Tiger") {
                document.getElementById('login').style.display = "none";
                document.getElementById('panel').style.display = "block";
            } else { alert("Gabim!"); }
        }
        function add() {
            let channels = JSON.parse(localStorage.getItem('myChannels')) || [];
            // If it's the first time adding, start with the defaults
            if(channels.length === 0) {
                // This line is optional but helps sync
            }
            channels.push({ name: document.getElementById('n').value, url: document.getElementById('l').value });
            localStorage.setItem('myChannels', JSON.stringify(channels));
            alert("U shtua!");
        }
    </script>
</body>
</html>
